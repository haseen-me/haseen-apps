name: Deploy Haseen Apps

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync Files to Server
        run: |
          rsync -avz --exclude='.git' --exclude='node_modules' --exclude='.github' ./ root@${{ secrets.SERVER_IP }}:/opt/haseen-apps/

      - name: Build and Restart on Remote Server
        run: |
          ssh root@${{ secrets.SERVER_IP }} "cd /opt/haseen-apps && docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build"
