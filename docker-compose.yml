services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: haseen
      POSTGRES_USER: haseen
      POSTGRES_PASSWORD: haseen_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.up.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
      - ./migrations/002_mail_tables.up.sql:/docker-entrypoint-initdb.d/002_mail_tables.sql
      - ./migrations/003_drive_tables.up.sql:/docker-entrypoint-initdb.d/003_drive_tables.sql
      - ./migrations/004_mail_enhancements.up.sql:/docker-entrypoint-initdb.d/004_mail_enhancements.sql
      - ./migrations/005_signed_pre_keys.up.sql:/docker-entrypoint-initdb.d/005_signed_pre_keys.sql
      - ./migrations/006_calendar_tables.up.sql:/docker-entrypoint-initdb.d/006_calendar_tables.sql
      - ./migrations/007_contacts.up.sql:/docker-entrypoint-initdb.d/007_contacts.sql
      - ./migrations/008_drive_trash.up.sql:/docker-entrypoint-initdb.d/008_drive_trash.sql
      - ./migrations/009_contacts_fields.up.sql:/docker-entrypoint-initdb.d/009_contacts_fields.sql
      - ./migrations/010_drive_starred.up.sql:/docker-entrypoint-initdb.d/010_drive_starred.sql
      - ./migrations/011_contact_groups.up.sql:/docker-entrypoint-initdb.d/011_contact_groups.sql
      - ./migrations/012_user_display_name.up.sql:/docker-entrypoint-initdb.d/012_user_display_name.sql
      - ./migrations/013_user_admin_flags.up.sql:/docker-entrypoint-initdb.d/013_user_admin_flags.sql
      - ./migrations/014_custom_domains.up.sql:/docker-entrypoint-initdb.d/014_custom_domains.sql
      - ./migrations/015_identity_v2.up.sql:/docker-entrypoint-initdb.d/015_identity_v2.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haseen"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  gateway:
    build:
      context: .
      dockerfile: deploy/Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      GATEWAY_PORT: "8080"
      AUTH_URL: "http://auth:8081"
      MAIL_URL: "http://mail:8082"
      DRIVE_URL: "http://drive:8083"
      KEYSERVER_URL: "http://keyserver:8084"
      CALENDAR_URL: "http://calendar:8085"
      CONTACTS_URL: "http://contacts:4008"
    depends_on:
      - auth
      - mail
      - drive
      - keyserver
      - calendar
      - contacts

  auth:
    build:
      context: .
      dockerfile: deploy/Dockerfile.auth
    environment:
      AUTH_PORT: "8081"
      DATABASE_URL: "postgres://haseen:haseen_dev_password@postgres:5432/haseen?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy

  mail:
    build:
      context: .
      dockerfile: deploy/Dockerfile.mail
    environment:
      MAIL_PORT: "8082"
      DATABASE_URL: "postgres://haseen:haseen_dev_password@postgres:5432/haseen?sslmode=disable"
      REDIS_URL: "redis://redis:6379/1"
    depends_on:
      postgres:
        condition: service_healthy

  drive:
    build:
      context: .
      dockerfile: deploy/Dockerfile.drive
    environment:
      DRIVE_PORT: "8083"
      DATABASE_URL: "postgres://haseen:haseen_dev_password@postgres:5432/haseen?sslmode=disable"
      BLOB_DIR: "/data/blobs"
    volumes:
      - drivedata:/data/blobs
    depends_on:
      postgres:
        condition: service_healthy

  keyserver:
    build:
      context: .
      dockerfile: deploy/Dockerfile.keyserver
    environment:
      KEYSERVER_PORT: "8084"
      DATABASE_URL: "postgres://haseen:haseen_dev_password@postgres:5432/haseen?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  calendar:
    build:
      context: .
      dockerfile: deploy/Dockerfile.calendar
    environment:
      CALENDAR_PORT: "8085"
      DATABASE_URL: "postgres://haseen:haseen_dev_password@postgres:5432/haseen?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  contacts:
    build:
      context: .
      dockerfile: deploy/Dockerfile.contacts
    environment:
      PORT: "4008"
      DATABASE_URL: "postgres://haseen:haseen_dev_password@postgres:5432/haseen?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  drivedata:
