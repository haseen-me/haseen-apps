name: Deploy Haseen Apps

on:
  push:
    branches:
      - main
    paths:
      - 'Caddyfile'
      - 'deploy/**'
      - 'docker-compose.prod.yml'
      - 'migrations/**'
      - 'services/**'
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - 'tsconfig.json'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - 'go.work'
      - 'go.work.sum'
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: haseen-me

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.detect.outputs.should_build }}
      image_tag: ${{ steps.detect.outputs.image_tag }}
      deploy_platforms: ${{ steps.config.outputs.deploy_platforms }}
      ui_ref: ${{ steps.config.outputs.ui_ref }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve deploy configuration
        id: config
        env:
          RAW_DEPLOY_PLATFORMS: ${{ vars.DEPLOY_PLATFORMS }}
          RAW_UI_REF: ${{ vars.UI_REF }}
        run: |
          set -euo pipefail

          deploy_platforms="${RAW_DEPLOY_PLATFORMS:-linux/amd64}"
          ui_ref="${RAW_UI_REF:-main}"

          echo "deploy_platforms=$deploy_platforms" >> "$GITHUB_OUTPUT"
          echo "ui_ref=$ui_ref" >> "$GITHUB_OUTPUT"

      - name: Detect build-impacting changes
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          should_build=false

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            should_build=true
          else
            if [[ -n "$BEFORE_SHA" ]] && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              mapfile -t changed_files < <(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")
            elif git rev-parse HEAD^ >/dev/null 2>&1; then
              mapfile -t changed_files < <(git diff --name-only HEAD^ HEAD)
            else
              mapfile -t changed_files < <(git ls-files)
            fi

            for file in "${changed_files[@]}"; do
              case "$file" in
                apps/*|packages/*|services/*|deploy/*|package.json|package-lock.json|turbo.json|tsconfig.json|buf.yaml|buf.gen.yaml|go.work|go.work.sum)
                  should_build=true
                  break
                  ;;
              esac
            done
          fi

          if [[ "$should_build" == "true" ]]; then
            image_tag="$CURRENT_SHA"
          else
            image_tag="latest"
          fi

          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

  build-images:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: changes
    if: needs.changes.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: auth
            dockerfile: haseen-apps/deploy/Dockerfile.auth
            context: ./haseen-apps
            cache_from: type=gha,scope=auth
            cache_to: type=gha,mode=max,scope=auth
          - image: mail
            dockerfile: haseen-apps/deploy/Dockerfile.mail
            context: ./haseen-apps
            cache_from: type=gha,scope=mail
            cache_to: type=gha,mode=max,scope=mail
          - image: drive
            dockerfile: haseen-apps/deploy/Dockerfile.drive
            context: ./haseen-apps
            cache_from: type=gha,scope=drive
            cache_to: type=gha,mode=max,scope=drive
          - image: keyserver
            dockerfile: haseen-apps/deploy/Dockerfile.keyserver
            context: ./haseen-apps
            cache_from: type=gha,scope=keyserver
            cache_to: type=gha,mode=max,scope=keyserver
          - image: calendar
            dockerfile: haseen-apps/deploy/Dockerfile.calendar
            context: ./haseen-apps
            cache_from: type=gha,scope=calendar
            cache_to: type=gha,mode=max,scope=calendar
          - image: contacts
            dockerfile: haseen-apps/deploy/Dockerfile.contacts
            context: ./haseen-apps
            cache_from: type=gha,scope=contacts
            cache_to: type=gha,mode=max,scope=contacts
          - image: gateway
            dockerfile: haseen-apps/deploy/Dockerfile.gateway
            context: ./haseen-apps
            cache_from: type=gha,scope=gateway
            cache_to: type=gha,mode=max,scope=gateway
          - image: web
            dockerfile: haseen-apps/deploy/Dockerfile.frontend
            context: .
            build_args: |
              APP_PACKAGE=@haseen-me/web
              APP_PATH=apps/web
            cache_from: |
              type=gha,scope=frontend
              type=gha,scope=web
            cache_to: |
              type=gha,mode=max,scope=frontend
              type=gha,mode=max,scope=web
          - image: accounts-web
            dockerfile: haseen-apps/deploy/Dockerfile.frontend
            context: .
            build_args: |
              APP_PACKAGE=@haseen-me/accounts-app
              APP_PATH=apps/accounts
            cache_from: |
              type=gha,scope=frontend
              type=gha,scope=accounts-web
            cache_to: |
              type=gha,mode=max,scope=frontend
              type=gha,mode=max,scope=accounts-web
          - image: mail-web
            dockerfile: haseen-apps/deploy/Dockerfile.frontend
            context: .
            build_args: |
              APP_PACKAGE=@haseen-me/mail-app
              APP_PATH=apps/mail
            cache_from: |
              type=gha,scope=frontend
              type=gha,scope=mail-web
            cache_to: |
              type=gha,mode=max,scope=frontend
              type=gha,mode=max,scope=mail-web
          - image: drive-web
            dockerfile: haseen-apps/deploy/Dockerfile.frontend
            context: .
            build_args: |
              APP_PACKAGE=@haseen-me/drive-app
              APP_PATH=apps/drive
            cache_from: |
              type=gha,scope=frontend
              type=gha,scope=drive-web
            cache_to: |
              type=gha,mode=max,scope=frontend
              type=gha,mode=max,scope=drive-web
          - image: calendar-web
            dockerfile: haseen-apps/deploy/Dockerfile.frontend
            context: .
            build_args: |
              APP_PACKAGE=@haseen-me/calendar-app
              APP_PATH=apps/calendar
            cache_from: |
              type=gha,scope=frontend
              type=gha,scope=calendar-web
            cache_to: |
              type=gha,mode=max,scope=frontend
              type=gha,mode=max,scope=calendar-web
          - image: contacts-web
            dockerfile: haseen-apps/deploy/Dockerfile.frontend
            context: .
            build_args: |
              APP_PACKAGE=@haseen-me/contacts-app
              APP_PATH=apps/contacts
            cache_from: |
              type=gha,scope=frontend
              type=gha,scope=contacts-web
            cache_to: |
              type=gha,mode=max,scope=frontend
              type=gha,mode=max,scope=contacts-web
          - image: ui-docs
            dockerfile: haseen-apps/deploy/Dockerfile.frontend
            context: .
            build_args: |
              APP_PACKAGE=@haseen-me/ui-docs
              APP_PATH=apps/ui-docs
            cache_from: |
              type=gha,scope=frontend
              type=gha,scope=ui-docs
            cache_to: |
              type=gha,mode=max,scope=frontend
              type=gha,mode=max,scope=ui-docs
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: haseen-apps
          fetch-depth: 1

      - name: Checkout UI Repo
        uses: actions/checkout@v4
        with:
          repository: haseen-me/ui
          ref: ${{ needs.changes.outputs.ui_ref }}
          path: ui
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        if: contains(needs.changes.outputs.deploy_platforms, 'arm64')
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ needs.changes.outputs.deploy_platforms }}
          pull: true
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest
          build-args: ${{ matrix.build_args }}
          cache-from: ${{ matrix.cache_from }}
          cache-to: ${{ matrix.cache_to }}

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - changes
      - build-images
    if: always() && needs.changes.result == 'success' && (needs.build-images.result == 'success' || needs.build-images.result == 'skipped')
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: haseen-apps
          fetch-depth: 1

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" 2>/dev/null >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync Files to Server
        run: |
          rsync -az \
            --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.github' \
            --exclude='.env.production' \
            --exclude='.env*' \
            --exclude='**/.turbo/' \
            --exclude='*.log' \
            ./haseen-apps/ root@${{ secrets.SERVER_IP }}:/opt/haseen-apps/

      - name: Validate and Deploy
        env:
          IMAGE_TAG: ${{ needs.changes.outputs.image_tag }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_ACTOR: ${{ github.actor }}
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          ENV_PRODUCTION_B64=""
          if [[ -n "${ENV_PRODUCTION:-}" ]]; then
            ENV_PRODUCTION_B64="$(printf '%s' "${ENV_PRODUCTION}" | base64 -w 0)"
          fi

          ssh root@"$SERVER_IP" \
            "REGISTRY='${REGISTRY}' IMAGE_TAG='${IMAGE_TAG}' GITHUB_TOKEN='${GITHUB_TOKEN}' GITHUB_ACTOR='${GITHUB_ACTOR}' ENV_PRODUCTION_B64='${ENV_PRODUCTION_B64}' COMPOSE_PROJECT_NAME='haseen-apps' bash -se" << 'DEPLOY_SCRIPT'
          set -euo pipefail
          
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          export IMAGE_TAG="${IMAGE_TAG:-latest}"
          
          cd /opt/haseen-apps || exit 1
          
          # Logging helper
          log_info() {
            echo "$(date '+%Y-%m-%d %H:%M:%S') [INFO] $*"
          }
          
          log_error() {
            echo "$(date '+%Y-%m-%d %H:%M:%S') [ERROR] $*" >&2
          }
          
          trap 'log_error "Deployment failed"; docker logout "${REGISTRY}" 2>/dev/null || true' EXIT
          
          export REGISTRY="${REGISTRY:-ghcr.io}"
          export GITHUB_TOKEN="${GITHUB_TOKEN:?missing GITHUB_TOKEN}"
          export GITHUB_ACTOR="${GITHUB_ACTOR:?missing GITHUB_ACTOR}"
          export COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME:-haseen-apps}"

          compose() {
            IMAGE_TAG="${IMAGE_TAG}" COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME}" docker compose --env-file .env.production -f docker-compose.prod.yml "$@"
          }

          # Ensure runtime env file exists on server
          if [[ ! -f .env.production ]]; then
            if [[ -n "${ENV_PRODUCTION_B64:-}" ]]; then
              log_info "Creating .env.production from ENV_PRODUCTION secret"
              printf '%s' "${ENV_PRODUCTION_B64}" | base64 -d > .env.production
              chmod 600 .env.production
            else
              log_error ".env.production is missing on server and ENV_PRODUCTION secret is not set"
              exit 1
            fi
          fi
          
          # Step 1: Docker login
          log_info "Authenticating with container registry..."
          echo "${GITHUB_TOKEN}" | docker login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin >/dev/null 2>&1
          
          # Step 2: Validate Caddyfile
          log_info "Validating Caddyfile..."
          install -m 644 Caddyfile /etc/caddy/Caddyfile
          if ! caddy validate --config /etc/caddy/Caddyfile; then
            log_error "Caddyfile validation failed"
            exit 1
          fi
          
          # Step 3: Reload Caddy
          log_info "Reloading Caddy..."
          if ! systemctl reload caddy; then
            log_error "Failed to reload Caddy"
            exit 1
          fi
          
          # Step 4: Pull latest images with retries
          log_info "Pulling container images (IMAGE_TAG=${IMAGE_TAG})..."
          if ! compose pull --quiet; then
            log_error "Failed to pull images"
            exit 1
          fi
          
          # Step 5: Stop existing containers (graceful shutdown)
          log_info "Stopping existing containers..."
          compose down --remove-orphans --timeout 30 || true

          # Step 5.5: Remove any orphaned network with incorrect Compose labels
          # This happens when the network was created outside of Compose (e.g. manually),
          # causing `compose up` to fail with "incorrect label" error.
          NETWORK_NAME="${COMPOSE_PROJECT_NAME}_default"
          if docker network inspect "$NETWORK_NAME" > /dev/null 2>&1; then
            LABEL_VAL=$(docker network inspect "$NETWORK_NAME" --format '{{ index .Labels "com.docker.compose.network" }}' 2>/dev/null || true)
            if [[ "$LABEL_VAL" != "default" ]]; then
              log_info "Removing orphaned network '$NETWORK_NAME' (label='$LABEL_VAL', expected='default')..."
              docker network rm "$NETWORK_NAME" || true
            fi
          fi

          # Step 6: Start containers with health checks
          log_info "Starting containers with IMAGE_TAG=${IMAGE_TAG}..."
          if ! compose up -d --remove-orphans --no-build; then
            log_error "Failed to start containers"
            exit 1
          fi
          
          # Step 7: Wait for services to be healthy
          log_info "Waiting for services to be healthy..."
          max_wait=120
          elapsed=0
          interval=5
          
          while [ $elapsed -lt $max_wait ]; do
            if compose ps --all | grep -q "healthy\|running"; then
              log_info "Checking service health..."
              if compose ps --all | grep -E "unhealthy|exited|restarting"; then
                log_error "Some services are unhealthy or exited"
                compose ps --all || true
                exit 1
              fi
              log_info "All services are healthy"
              break
            fi
            echo "."
            sleep $interval
            elapsed=$((elapsed + interval))
          done
          
          if [ $elapsed -ge $max_wait ]; then
            log_error "Services did not become healthy within ${max_wait} seconds"
            compose ps --all || true
            exit 1
          fi
          
          # Step 8: Cleanup
          log_info "Cleaning up..."
          docker logout "${REGISTRY}" 2>/dev/null || true
          docker system prune -f --filter "until=72h" 2>/dev/null || true
          
          trap - EXIT
          
          log_info "Deployment completed successfully"
          DEPLOY_SCRIPT

      - name: Verify Deployment
        if: always()
        continue-on-error: true
        run: |
          ssh root@${{ secrets.SERVER_IP }} << 'VERIFY_SCRIPT'
          set -euo pipefail
          
          export IMAGE_TAG="${IMAGE_TAG:-latest}"
          export COMPOSE_PROJECT_NAME="haseen-apps"
          
          echo "=== Container Status ==="
          if [ -f /opt/haseen-apps/.env.production ]; then
            IMAGE_TAG="${IMAGE_TAG}" COMPOSE_PROJECT_NAME="${COMPOSE_PROJECT_NAME}" docker compose --env-file /opt/haseen-apps/.env.production -f /opt/haseen-apps/docker-compose.prod.yml ps --all || true
          else
            echo "WARN: /opt/haseen-apps/.env.production not found"
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" || true
          fi
          
          echo ""
          echo "=== Service Health ==="
          docker ps --format "table {{.Names}}\t{{.Status}}"
          
          VERIFY_SCRIPT
        env:
          IMAGE_TAG: ${{ needs.changes.outputs.image_tag }}
