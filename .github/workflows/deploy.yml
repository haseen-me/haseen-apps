name: Deploy Haseen Apps

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-images:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: auth
            dockerfile: haseen-apps/deploy/Dockerfile.auth
            context: ./haseen-apps
          - image: mail
            dockerfile: haseen-apps/deploy/Dockerfile.mail
            context: ./haseen-apps
          - image: drive
            dockerfile: haseen-apps/deploy/Dockerfile.drive
            context: ./haseen-apps
          - image: keyserver
            dockerfile: haseen-apps/deploy/Dockerfile.keyserver
            context: ./haseen-apps
          - image: calendar
            dockerfile: haseen-apps/deploy/Dockerfile.calendar
            context: ./haseen-apps
          - image: contacts
            dockerfile: haseen-apps/deploy/Dockerfile.contacts
            context: ./haseen-apps
          - image: gateway
            dockerfile: haseen-apps/deploy/Dockerfile.gateway
            context: ./haseen-apps
          - image: web
            dockerfile: haseen-apps/deploy/Dockerfile.frontend
            context: .
            build_args: |
              APP_PACKAGE=@haseen-me/web
              APP_PATH=apps/web
          - image: accounts-web
            dockerfile: haseen-apps/deploy/Dockerfile.frontend
            context: .
            build_args: |
              APP_PACKAGE=@haseen-me/accounts-app
              APP_PATH=apps/accounts
          - image: mail-web
            dockerfile: haseen-apps/deploy/Dockerfile.frontend
            context: .
            build_args: |
              APP_PACKAGE=@haseen-me/mail-app
              APP_PATH=apps/mail
          - image: drive-web
            dockerfile: haseen-apps/deploy/Dockerfile.frontend
            context: .
            build_args: |
              APP_PACKAGE=@haseen-me/drive-app
              APP_PATH=apps/drive
          - image: calendar-web
            dockerfile: haseen-apps/deploy/Dockerfile.frontend
            context: .
            build_args: |
              APP_PACKAGE=@haseen-me/calendar-app
              APP_PATH=apps/calendar
          - image: contacts-web
            dockerfile: haseen-apps/deploy/Dockerfile.frontend
            context: .
            build_args: |
              APP_PACKAGE=@haseen-me/contacts-app
              APP_PATH=apps/contacts
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: haseen-apps

      - name: Checkout UI Repo
        uses: actions/checkout@v4
        with:
          repository: haseen-me/ui
          path: ui

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/haseen-me/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/haseen-me/${{ matrix.image }}:latest
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-images
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: haseen-apps

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync Files to Server
        run: |
          rsync -avz --exclude='.git' --exclude='node_modules' --exclude='.github' ./haseen-apps/ root@${{ secrets.SERVER_IP }}:/opt/haseen-apps/

      - name: Pull and Restart on Remote Server
        run: |
          ssh root@${{ secrets.SERVER_IP }} "
            set -e
            cd /opt/haseen-apps
            echo '${{ github.token }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            install -m 644 Caddyfile /etc/caddy/Caddyfile
            caddy validate --config /etc/caddy/Caddyfile
            systemctl reload caddy
            IMAGE_TAG='${{ github.sha }}' docker compose --env-file .env.production -f docker-compose.prod.yml pull
            IMAGE_TAG='${{ github.sha }}' docker compose --env-file .env.production -f docker-compose.prod.yml up -d --remove-orphans --no-build --wait
            docker logout ghcr.io
          "
