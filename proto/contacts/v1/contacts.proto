syntax = "proto3";

package haseen.contacts.v1;

option go_package = "github.com/haseen-me/haseen-apps/proto/gen/go/contacts/v1";

import "crypto/v1/crypto.proto";

message ContactName {
  string display_name = 1;
  string given_name = 2;
  string middle_name = 3;
  string family_name = 4;
  string prefix = 5;
  string suffix = 6;
}

message LabeledValue {
  string label = 1;
  string custom_label = 2;
  string value = 3;
  bool is_primary = 4;
}

message ContactAddress {
  string label = 1;
  string custom_label = 2;
  string street_line_1 = 3;
  string street_line_2 = 4;
  string city = 5;
  string region = 6;
  string postal_code = 7;
  string country = 8;
  bool is_primary = 9;
}

message ContactRelationship {
  string label = 1;
  string custom_label = 2;
  string name = 3;
}

message ContactEvent {
  string label = 1;
  string custom_label = 2;
  string date_iso = 3;
}

message ContactPayload {
  string contact_id = 1;
  string owner_id = 2;
  ContactName name = 3;
  repeated LabeledValue emails = 4;
  repeated LabeledValue phones = 5;
  repeated ContactAddress addresses = 6;
  repeated string labels = 7;
  repeated ContactRelationship relationships = 8;
  repeated ContactEvent events = 9;
  string company = 10;
  string job_title = 11;
  string notes = 12;
  int64 created_at = 13;
  int64 updated_at = 14;
}

message EncryptedContactRecord {
  string contact_id = 1;
  string owner_id = 2;
  uint32 schema_version = 3;
  haseen.crypto.v1.EncryptedData encrypted_payload = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}
