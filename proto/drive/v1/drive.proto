syntax = "proto3";

package haseen.drive.v1;

option go_package = "github.com/haseen-me/haseen-apps/proto/gen/go/drive/v1";

import "crypto/v1/crypto.proto";

message EncryptedFile {
  string file_id = 1;
  string name = 2;
  string mime_type = 3;
  uint64 size = 4;
  string folder_id = 5;
  string owner_id = 6;
  haseen.crypto.v1.EncryptedData encrypted_metadata = 7;
  haseen.crypto.v1.EncryptedData encrypted_content_key = 8;
  int64 created_at = 9;
  int64 updated_at = 10;
}

message Folder {
  string folder_id = 1;
  string name = 2;
  string parent_id = 3;
  string owner_id = 4;
  int64 created_at = 5;
}
