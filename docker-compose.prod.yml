services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-haseen}
      POSTGRES_USER: ${POSTGRES_USER:-haseen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.up.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
      - ./migrations/002_mail_tables.up.sql:/docker-entrypoint-initdb.d/002_mail_tables.sql:ro
      - ./migrations/003_drive_tables.up.sql:/docker-entrypoint-initdb.d/003_drive_tables.sql:ro
      - ./migrations/004_mail_enhancements.up.sql:/docker-entrypoint-initdb.d/004_mail_enhancements.sql:ro
      - ./migrations/005_signed_pre_keys.up.sql:/docker-entrypoint-initdb.d/005_signed_pre_keys.sql:ro
      - ./migrations/006_calendar_tables.up.sql:/docker-entrypoint-initdb.d/006_calendar_tables.sql:ro
      - ./migrations/007_contacts.up.sql:/docker-entrypoint-initdb.d/007_contacts.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-haseen} -d ${POSTGRES_DB:-haseen}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  auth:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/auth:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      AUTH_PORT: "8081"
      DATABASE_URL: postgres://${POSTGRES_USER:-haseen}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-haseen}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env.production}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  mail:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/mail:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      MAIL_PORT: "8082"
      DATABASE_URL: postgres://${POSTGRES_USER:-haseen}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-haseen}?sslmode=disable
      REDIS_URL: redis://redis:6379/1
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  drive:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/drive:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      DRIVE_PORT: "8083"
      DATABASE_URL: postgres://${POSTGRES_USER:-haseen}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-haseen}?sslmode=disable
      BLOB_DIR: /data/blobs
    volumes:
      - drivedata:/data/blobs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      postgres:
        condition: service_healthy

  keyserver:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/keyserver:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      KEYSERVER_PORT: "8084"
      DATABASE_URL: postgres://${POSTGRES_USER:-haseen}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-haseen}?sslmode=disable
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8084/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      postgres:
        condition: service_healthy

  calendar:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/calendar:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      CALENDAR_PORT: "8085"
      DATABASE_URL: postgres://${POSTGRES_USER:-haseen}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-haseen}?sslmode=disable
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8085/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      postgres:
        condition: service_healthy

  contacts:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/contacts:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      PORT: "4008"
      DATABASE_URL: postgres://${POSTGRES_USER:-haseen}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-haseen}?sslmode=disable
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4008/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/gateway:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      GATEWAY_PORT: "8080"
      AUTH_URL: http://auth:8081
      MAIL_URL: http://mail:8082
      DRIVE_URL: http://drive:8083
      KEYSERVER_URL: http://keyserver:8084
      CALENDAR_URL: http://calendar:8085
      CONTACTS_URL: http://contacts:4008
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://haseen.me}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      - auth
      - mail
      - drive
      - keyserver
      - calendar
      - contacts

  web:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      - gateway

  accounts-web:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/accounts-web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      - gateway

  mail-web:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/mail-web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      - gateway

  drive-web:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/drive-web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      - gateway

  calendar-web:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/calendar-web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      - gateway

  contacts-web:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/contacts-web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "127.0.0.1:3005:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      - gateway

  ui-docs:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-haseen-me}/ui-docs:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      - gateway

volumes:
  pgdata:
  redisdata:
  drivedata:
