version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/haseen-me/haseen-apps/proto/gen/go
plugins:
  - local: protoc-gen-go
    out: proto/gen/go
    opt: paths=source_relative
  - local: ./node_modules/.bin/protoc-gen-es
    out: proto/gen/ts
    opt: target=ts
