syntax = "proto3";

package haseen.calendar.v1;

option go_package = "github.com/haseen-me/haseen-apps/proto/gen/go/calendar/v1";

import "crypto/v1/crypto.proto";

message EncryptedCalendarEvent {
  string event_id = 1;
  string calendar_id = 2;
  string owner_id = 3;
  haseen.crypto.v1.EncryptedData encrypted_title = 4;
  haseen.crypto.v1.EncryptedData encrypted_description = 5;
  haseen.crypto.v1.EncryptedData encrypted_location = 6;
  int64 start_time = 7;
  int64 end_time = 8;
  bool all_day = 9;
  string recurrence_rule = 10;
  string color = 11;
  repeated Attendee attendees = 12;
  repeated Reminder reminders = 13;
  int64 created_at = 14;
  int64 updated_at = 15;
}

message Calendar {
  string calendar_id = 1;
  string owner_id = 2;
  string name = 3;
  string color = 4;
  bool is_default = 5;
  int64 created_at = 6;
}

message Attendee {
  string attendee_id = 1;
  string email = 2;
  string status = 3;
}

message Reminder {
  string reminder_id = 1;
  int32 minutes_before = 2;
}
